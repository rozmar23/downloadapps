<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WiAutoClicker - Apps</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="favicon.ico">
</head>
<body>

<img class="main-bg" src="background.jpg" alt="Background">

<header class="topbar">
    <div class="container header-flex">
        <div class="logo">
            <img src="logo.png" alt="Logo">
            <span>EcoForums</span>
        </div>
        <nav class="navigation">
            <a href="https://rozmar23.github.io/main/">Main</a>
            <a href="#">Download</a>
            <a href="https://rozmar23.github.io/support/">Support</a>
        </nav>
    </div>
</header>

<div class="container main-content">
    <div class="aero-window">
        <div class="aero-header">
            <h2>Auto Clicker</h2>
        </div>
        <div class="inner-content">
            <div class="app-card">
                <div class="app-image-side">
                    <img src="logo.png" class="app-thumb" alt="Auto Clicker Logo">
                </div>
                <div class="app-details-side">
                    <div class="app-label">WiAutoClicker 1.0.0</div>
                    <p>Fast auto clicker for Win 7-11. Customizable hotkeys.</p>
                    <span class="status-badge online">Available</span>
                </div>
                <div class="app-action-side">
                    <a href="download.html" class="aero-button">Download</a>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
